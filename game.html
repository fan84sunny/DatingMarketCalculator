<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女友送命題 - 挑戰遊戲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background: #000; }
        
        .game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* 背景滾動效果 */
        .background-scroll { 
            position: absolute;
            top: 0;
            left: 0;
            width: 1726px;
            height: 612px;
            background-image: url('image/background_full.png');
            background-size: cover;
            background-position: center;
            transform: scale(var(--scale-y));
            transform-origin: top left;
        }
        
        /* 人物固定在中間 */
        .character { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
        }
        
        .character img { 
            height: 80vh;
            max-height: 600px;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
        }
        
        /* 遊戲 UI 層 */
        .ui-layer { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            z-index: 200;
            pointer-events: none;
        }
        
        /* 頂部分數和計時器 */
        .top-info { 
            display: flex;
            gap: 40px;
            justify-content: space-between;
            width: 100%;
            padding: 0 40px;
        }
        
        .score-box, .timer-box { 
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid #ec4899;
            text-align: center;
        }

        .personality-box {
            border-color: #22c55e;
            min-width: 240px;
        }

        .personality-value {
            font-size: 1.2rem;
            color: #86efac;
            margin-top: 6px;
        }
        
        .score-text { font-size: 0.9rem; color: #ccc; margin-top: 5px; }
        
        .timer-box { border-color: #3b82f6; }
        
        .score-value { 
            font-size: 2.5rem;
            color: #ec4899;
        }
        
        .timer-value { 
            font-size: 2.5rem;
            color: #3b82f6;
        }
        
        /* 問題區域 */
        .question-modal { 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(30, 30, 50, 0.95) 100%);
            border: 3px solid #ec4899;
            border-radius: 20px;
            padding: 50px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            display: none;
            flex-direction: column;
            z-index: 300;
            box-shadow: 0 0 50px rgba(236, 72, 153, 0.5);
            pointer-events: all;
        }
        
        .question-modal.active { display: flex; }
        
        .question-text { 
            color: #fbbf24;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.4;
        }

        .question-timer {
            align-self: center;
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
            background: rgba(15, 23, 42, 0.65);
            border-radius: 999px;
            padding: 6px 14px;
            margin: 0 auto 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .options-container { 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .option { 
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #64748b;
            color: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: left;
            line-height: 1.5;
            pointer-events: all;
        }
        
        .option:hover { 
            background: rgba(255, 255, 255, 0.1);
            border-color: #ec4899;
        }
        
        .option-label { 
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #3b82f6;
        }
        
        .option-text { 
            display: block;
            color: #e2e8f0;
        }
        
        .option.correct { 
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }
        
        .option.wrong { 
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }
        
        /* 遊戲結束螢幕 */
        .game-over-modal { 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 400;
            pointer-events: all;
        }
        
        .game-over-modal.active { display: flex; }

        .start-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.78);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 380;
            padding: 20px;
            pointer-events: all;
        }

        .start-modal.hidden {
            display: none;
        }

        .start-card {
            width: min(960px, 95vw);
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.95), rgba(30, 41, 59, 0.95));
            border: 2px solid #38bdf8;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        }

        .start-title {
            color: #f8fafc;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 800;
        }

        .start-subtitle {
            color: #cbd5e1;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .personality-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .personality-card {
            border: 1px solid rgba(148, 163, 184, 0.5);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.72);
            color: #e2e8f0;
            padding: 16px;
            text-align: left;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .personality-card:hover {
            transform: translateY(-3px);
            border-color: #38bdf8;
            background: rgba(30, 41, 59, 0.9);
        }

        .personality-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .personality-desc {
            color: #cbd5e1;
            line-height: 1.5;
            font-size: 0.95rem;
            min-height: 72px;
        }

        .personality-rule {
            color: #67e8f9;
            font-size: 0.82rem;
            margin-top: 8px;
        }
        
        .game-over-content { 
            text-align: center;
            color: white;
        }
        
        .game-over-title { 
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #ef4444;
        }
        
        .game-over-score { 
            font-size: 2rem;
            margin-bottom: 40px;
            color: #fbbf24;
        }
        
        .game-over-message { 
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #cbd5e1;
            line-height: 1.8;
        }
        
        .game-over-btn { 
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            pointer-events: all;
        }
        
        .game-over-btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.5);
        }
        
        .home-btn { 
            background: #3b82f6;
            margin-left: 15px;
        }
        
        .home-btn:hover { 
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }
        
        /* 鍵盤提示 */
        .keyboard-hint { 
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            z-index: 150;
        }
        
        .keyboard-hint span { 
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 6px;
            margin: 0 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* 響應式設計 */
        @media (max-width: 768px) {
            .question-modal { 
                padding: 30px;
                max-width: 95%;
            }
            
            .question-text { 
                font-size: 1.3rem;
            }
            
            .score-box, .timer-box { 
                font-size: 1rem;
                padding: 10px 20px;
            }
            
            .score-value, .timer-value { 
                font-size: 1.8rem;
            }
            
            .top-info { 
                gap: 20px;
            }

            .personality-box {
                min-width: 0;
                padding: 10px 16px;
            }

            .personality-value {
                font-size: 0.95rem;
            }

            .personality-grid {
                grid-template-columns: 1fr;
            }

            .start-card {
                padding: 22px;
            }

            .start-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- 背景滾動容器 -->
    <div class="background-scroll" id="backgroundScroll"></div>
    
    <!-- 人物角色 -->
    <div class="character">
        <img src="image/Girl_standing.png" alt="角色">
    </div>
    
    <!-- UI 層 -->
    <div class="ui-layer">
        <!-- 頂部信息 -->
        <div class="top-info">
            <div class="score-box">
                <div>❤️ 好感度</div>
                <div class="score-value" id="scoreDisplay">10</div>
            </div>
            <div class="timer-box">
                <div>📊 題目進度</div>
                <div class="timer-value" id="testedDisplay">0</div>
                <div class="score-text">未測：<span id="untestedDisplay">0</span></div>
            </div>
            <div class="score-box personality-box">
                <div>🎯 個性模式</div>
                <div class="personality-value" id="personalityDisplay">未選擇</div>
            </div>
        </div>
        
        <!-- 問題彈窗 -->
        <div class="question-modal" id="questionModal">
            <div class="question-timer">⏱️ 倒數 <span id="questionTimerDisplay">--</span></div>
            <div class="question-text" id="questionText"></div>
            <div class="options-container" id="optionsContainer"></div>
        </div>
    </div>
    
    <!-- 遊戲結束彈窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-content">
            <div class="game-over-title">💔 遊戲結束</div>
            <div class="game-over-score" id="finalScore"></div>
            <div class="game-over-message" id="gameOverMessage"></div>
            <div>
                <button class="game-over-btn" onclick="location.reload()">再挑戰一次</button>
                <button class="game-over-btn home-btn" onclick="window.location.href='index.html'">返回首頁</button>
            </div>
        </div>
    </div>

    <!-- 開局人格選擇 -->
    <div class="start-modal" id="startModal">
        <div class="start-card">
            <div class="start-title">先選她的個性，再開始遊戲</div>
            <div class="start-subtitle">每種個性對同一句話的喜好都不同，分數邏輯也會跟著改變。</div>
            <div class="personality-grid" id="personalityGrid"></div>
        </div>
    </div>
    
    <!-- 鍵盤提示 -->
    <div class="keyboard-hint">
        <span>← →</span> 移動背景視角
    </div>
</div>

<script>
    // 遊戲配置
    const GAME_CONFIG = {
        maxScore: 10,
        questionInterval: 6000, // 5秒出現一題
        questionDuration: 5000,   // 5秒回答時間
        initialQuestionDelay: 3000, // 開局第一題等待3秒
        postAnswerDelay: 1000     // 作答後至少等待1秒再出下一題
    };
    
    // 問題庫 - 格式: {問題, 選項: [{文案, 評分}]}
    
    const pragmaticQuestions = [
        {
            text: "我和你媽掉水裡你先救誰？",
            options: [
                { text: "先救離我最近、最危急的，然後立刻找人支援。", score: 3 },
                { text: "我當然先救你！你是我唯一、我願意為你不要命！", score: -3 },
                { text: "這題很難，先別聊這個。", score: 0 }
            ]
        },
        {
            text: "我閨蜜/前女友漂亮嗎？",
            options: [
                { text: "每個人審美不同，我比較在乎相處舒服。", score: 3 },
                { text: "你最美，她們根本不能比，我眼裡只有你。", score: -2 },
                { text: "普通吧。", score: -1 }
            ]
        },
        {
            text: "這件衣服/這條裙子我穿好看嗎？",
            options: [
                { text: "版型很適合你，走路也方便。", score: 3 },
                { text: "我會用我全部的人生告訴你你穿什麼都像女神降臨，連空氣都在發光。", score: -3 },
                { text: "還行。", score: 0 }
            ]
        },
        {
            text: "你覺得我哪裡胖了/醜了？",
            options: [
                { text: "我不會用這種方式評論你外表，有需要我們一起調整狀態。", score: 3 },
                { text: "你超完美，一點缺點都沒有！", score: -2 },
                { text: "最近是有一點。", score: -3 }
            ]
        },
        {
            text: "我和你的遊戲/工作/兄弟誰重要？",
            options: [
                { text: "都重要，但你是伴侶，我會先處理我們的事。", score: 3 },
                { text: "你最重要，其他全部都可以丟掉。", score: -2 },
                { text: "工作最重要。", score: -2 }
            ]
        },
        {
            text: "你為什麼沒有第一時間回我訊息？",
            options: [
                { text: "剛在忙，現在回你；下次我會先說一聲。", score: 3 },
                { text: "對不起寶貝我罪該萬死，我發誓以後 0.1 秒內回你。", score: -2 },
                { text: "我愛回就回。", score: -3 }
            ]
        },
        {
            text: "你有沒有看我昨天的限時動態貼文？",
            options: [
                { text: "有看到重點那幾則，你昨天心情不錯。", score: 3 },
                { text: "我每一秒都在看，因為你是我的全世界。", score: -2 },
                { text: "沒看。", score: -1 }
            ]
        },
        {
            text: "咱們什麼時候結婚呢？",
            options: [
                { text: "我們把時間、財務、共識談清楚，再定時間。", score: 3 },
                { text: "現在立刻結，我馬上去買戒指昭告天下！", score: -2 },
                { text: "不要談這個。", score: -2 }
            ]
        },
        {
            text: "你有沒有想過和我一起的未來？",
            options: [
                { text: "有，包含住哪、工作安排和生活分工。", score: 3 },
                { text: "我每天都幻想你穿婚紗到 80 歲，浪漫到宇宙盡頭。", score: -2 },
                { text: "以後再說。", score: -1 }
            ]
        },
        {
            text: "你是真的愛我嗎？",
            options: [
                { text: "是，我會用行動讓你感受到。", score: 3 },
                { text: "愛爆，我可以為你跟世界對抗、連命都給你。", score: -3 },
                { text: "不知道。", score: -2 }
            ]
        },
        {
            text: "你有沒有後悔跟我在一起？",
            options: [
                { text: "沒有；有摩擦就拿出來談，不用靠猜。", score: 3 },
                { text: "我後悔沒早點遇到你 500 年。", score: -1 },
                { text: "有時會。", score: -3 }
            ]
        },
        {
            text: "你前任比較好還是我比較好？",
            options: [
                { text: "不同人沒必要比較，我選擇的是現在的你。", score: 3 },
                { text: "你完勝，她完全不值一提。", score: -2 },
                { text: "都差不多。", score: -2 }
            ]
        },
        {
            text: "如果有更漂亮的人喜歡你怎麼辦？",
            options: [
                { text: "我會保持距離，先把界線說清楚。", score: 3 },
                { text: "我可能會考慮。", score: -3 },
                { text: "我只看臉，誰美選誰。", score: -3 }
            ]
        },
        {
            text: "你會不會有一天不愛我？",
            options: [
                { text: "感情要經營，我會持續溝通而不是擺爛。", score: 3 },
                { text: "我永遠永遠永遠都不會變，宇宙毀滅也不變。", score: -2 },
                { text: "會，人都會變。", score: -2 }
            ]
        },
        {
            text: "你是不是覺得我很黏？",
            options: [
                { text: "我懂你想被重視，我們找彼此舒服的節奏。", score: 3 },
                { text: "一點都不黏，你 24 小時找我都行。", score: -2 },
                { text: "有點煩。", score: -3 }
            ]
        },
        {
            text: "如果我很無理取鬧怎麼辦？",
            options: [
                { text: "先冷靜，再把事情講清楚。", score: 3 },
                { text: "你怎樣都對，我全部吞下去。", score: -2 },
                { text: "那就分開。", score: -3 }
            ]
        },
        {
            text: "你朋友說我不好你會怎樣？",
            options: [
                { text: "我會先了解事實，再自己判斷，不讓外人帶風向。", score: 3 },
                { text: "我一定跟朋友翻臉，誰說你我就絕交。", score: -2 },
                { text: "他們說什麼我就信。", score: -3 }
            ]
        },
        {
            text: "你覺得我跟你媽相處得來嗎？",
            options: [
                { text: "需要磨合，我會協調，不讓你一個人扛。", score: 3 },
                { text: "你一定要完美融入我家，不然不行。", score: -3 },
                { text: "應該吧，順其自然。", score: 0 }
            ]
        },
        {
            text: "你是不是覺得我很任性？",
            options: [
                { text: "有情緒很正常，我們把需求講清楚就好。", score: 3 },
                { text: "你一點都不任性，你是最完美的天使。", score: -2 },
                { text: "對，很任性。", score: -3 }
            ]
        },
        {
            text: "你會不會覺得我很麻煩？",
            options: [
                { text: "遇到問題就一起處理，不用貼麻煩標籤。", score: 3 },
                { text: "你完全不麻煩，你叫我做什麼我都秒做。", score: -2 },
                { text: "超麻煩。", score: -3 }
            ]
        },
        {
            text: "如果我們吵架你會先低頭嗎？",
            options: [
                { text: "我會先讓情緒降下來，再主動談。", score: 3 },
                { text: "我永遠先跪，因為你永遠是對的。", score: -3 },
                { text: "看我心情。", score: -2 }
            ]
        },
        {
            text: "你是不是比較愛自己？",
            options: [
                { text: "我會先照顧好自己，也會好好經營我們。", score: 3 },
                { text: "我只愛你，我自己完全不重要。", score: -2 },
                { text: "對，我只顧自己。", score: -3 }
            ]
        },
        {
            text: "如果我哭你會怎樣？",
            options: [
                { text: "先陪你穩定下來，再聽你想說的。", score: 3 },
                { text: "我會哭得比你更大聲，證明我更愛你。", score: -2 },
                { text: "你自己冷靜。", score: -3 }
            ]
        },
        {
            text: "我生病了，該怎麼辦啊？",
            options: [
                { text: "先量體溫、補水休息，必要時陪你看醫生。", score: 3 },
                { text: "多喝熱水，其他我不管。", score: -3 },
                { text: "我幫你發文祈福，一定會好。", score: -2 }
            ]
        },
        {
            text: "我和你前女友同時掉進糞坑，你會怎樣？",
            options: [
                { text: "先確保人身安全，再叫救援，不演八點檔。", score: 3 },
                { text: "我只救你，因為你是宇宙唯一真愛。", score: -2 },
                { text: "我先拍照再說。", score: -3 }
            ]
        },
        {

            options: [

                { text: "不可能，想都別想。", score: -2 }

        },
        {

            options: [

            ]
        },
        {

            options: [

        {

        },
        {

            options: [
                { text: "想過風險，所以更重視溝通和經營。", score: 3 },

                { text: "早就準備好了。", score: -3 }
            ]
        },
        {
            text: "你相信男女之間有純友誼嗎？",
            options: [
                { text: "我相信有，但界線要清楚。", score: 3 },
                { text: "我連和異性說話都不敢，因為我只屬於你。", score: -2 },
                { text: "不重要，我想怎樣就怎樣。", score: -2 }
            ]
        },
        {
            text: "你會介意我在你之前有過別的人嗎？",
            options: [
                { text: "不介意過去，我更看重現在怎麼相處。", score: 3 },
                { text: "我只要想到就崩潰，但我還是會硬撐。", score: -2 },
                { text: "會，這很扣分。", score: -3 }
            ]
        },
        {
            text: "其實你到底喜歡我哪一點？",
            options: [
                { text: "你做事有主見、相處直接，這很吸引我。", score: 3 },
                { text: "你全身上下每一根頭髮都完美無瑕，像神蹟。", score: -2 },
                { text: "就外表。", score: -2 }
            ]
        },
        {
            text: "如果哪天你愛上別人了，會告訴我嗎？",
            options: [
                { text: "會，我會誠實說清楚並負責任收尾。", score: 3 },
                { text: "不會有那天，我的愛濃度永遠 100%。", score: -2 },
                { text: "不會，省麻煩。", score: -3 }
            ]
        },
        {
            text: "我懷孕了，該怎麼辦？",
            options: [
                { text: "先結婚，後續計畫討論下。", score: 3 },
                { text: "先生下來，結婚可以之後再討論。", score: 0 },
                { text: "拿掉，或先有小孩再結婚，先走一步看一步。", score: -2 }
            ]
        }
    ];
    
    const PERSONALITY_META = {
        pragmatic: {
            label: "務實獨立型",
            description: "重視真誠、邏輯與界線，討厭過度浮誇。",
            rule: "平實理性高分，油膩情話低分"
        },
        romantic: {
            label: "浪漫感性型",
            description: "喜歡被重視與情緒價值，甜度越高越容易加分。",
            rule: "浪漫告白高分，太冷靜會扣分"
        },
        chill: {
            label: "隨和鬆弛型",
            description: "偏好輕鬆自然，不喜歡控制或情緒勒索。",
            rule: "簡潔自然高分，極端發言低分"
        }
    };

    const questionBanks = {
        pragmatic: pragmaticQuestions,
        romantic: buildPersonalityBank(pragmaticQuestions, "romantic"),
        chill: buildPersonalityBank(pragmaticQuestions, "chill")
    };

    let selectedPersonality = null;
    let activeQuestions = [];
    let seenQuestionIndexes = new Set();

    // 遊戲狀態
    let gameState = {
        score: GAME_CONFIG.maxScore,
        isGameOver: false,
        currentQuestion: null,
        currentQuestionIndex: null,
        questionActive: false,
        scrollPosition: 0,
        hasStarted: false
    };
    
    // 初始化遊戲
    function initGame() {
        updateScoreDisplay();
        adjustBackgroundScale();
        setupKeyboardControls();
        renderPersonalityCards();
    }

    function renderPersonalityCards() {
        const grid = document.getElementById('personalityGrid');
        grid.innerHTML = '';

        Object.entries(PERSONALITY_META).forEach(([id, info]) => {
            const card = document.createElement('button');
            card.type = 'button';
            card.className = 'personality-card';
            card.innerHTML = `
                <div class="personality-name">${info.label}</div>
                <div class="personality-desc">${info.description}</div>
                <div class="personality-rule">規則：秘密</div>
            `;
            card.addEventListener('click', () => startGameWithPersonality(id));
            grid.appendChild(card);
        });
    }

    function startGameWithPersonality(personalityId) {
        selectedPersonality = personalityId;
        activeQuestions = questionBanks[personalityId];
        seenQuestionIndexes = new Set();
        gameState.hasStarted = true;
        gameState.currentQuestionIndex = null;

        document.getElementById('personalityDisplay').textContent = PERSONALITY_META[personalityId].label;
        document.getElementById('startModal').classList.add('hidden');
        updateQuestionProgress();
        updateQuestionTimerDisplay(getQuestionDurationSeconds());
        scheduleNextQuestion(GAME_CONFIG.initialQuestionDelay);
    }

    function updateQuestionProgress() {
        const tested = seenQuestionIndexes.size;
        const total = activeQuestions.length;
        const untested = Math.max(total - tested, 0);

        document.getElementById('testedDisplay').textContent = String(tested);
        document.getElementById('untestedDisplay').textContent = String(untested);
    }

    function updateQuestionTimerDisplay(value) {
        document.getElementById('questionTimerDisplay').textContent = String(value);
    }

    function getQuestionDurationSeconds() {
        return Math.max(1, Math.ceil(GAME_CONFIG.questionDuration / 1000));
    }

    function buildPersonalityBank(baseQuestions, personalityType) {
        const scoreMap = {
            romantic: { 3: -2, 2: -1, 1: 1, 0: 0, '-1': 2, '-2': 3, '-3': 3 },
            chill: { 3: 2, 2: 1, 1: 1, 0: 3, '-1': 1, '-2': -1, '-3': -3 }
        };

        return baseQuestions.map((question) => ({
            text: question.text,
            options: question.options.map((option) => ({
                text: option.text,
                score: scoreMap[personalityType][option.score]
            }))
        }));
    }
    
    // 調整背景縮放以填滿屏幕
    function adjustBackgroundScale() {
        const container = document.querySelector('.game-container');
        const bgScroll = document.getElementById('backgroundScroll');
        const scaleY = container.clientHeight / 612;
        bgScroll.style.setProperty('--scale-y', scaleY);
    }
    
    // 鍵盤控制 - 左右箭頭移動背景
    function setupKeyboardControls() {
        document.addEventListener('keydown', (e) => {
            if (gameState.isGameOver) return;
            
            const bgScroll = document.getElementById('backgroundScroll');
            const container = document.querySelector('.game-container');
            
            // 計算縮放係數
            const scaleY = container.clientHeight / 612;
            // 縮放後的實際背景寬度
            const scaledBgWidth = 1726 * scaleY;
            // 最大滾動範圍 = 縮放後的背景寬度 - 視窗寬度
            const maxScroll = Math.max(scaledBgWidth - window.innerWidth, 0);
            const moveDistance = 50;
            
            if (e.key === 'ArrowLeft') {
                gameState.scrollPosition = Math.max(0, gameState.scrollPosition - moveDistance);
                bgScroll.style.left = -gameState.scrollPosition + 'px';
            } else if (e.key === 'ArrowRight') {
                gameState.scrollPosition = Math.min(maxScroll, gameState.scrollPosition + moveDistance);
                bgScroll.style.left = -gameState.scrollPosition + 'px';
            }
        });
    }
    
    // 排程下一個問題
    function scheduleNextQuestion(delay = GAME_CONFIG.questionInterval) {
        if (gameState.isGameOver || !gameState.hasStarted) return;
        
        setTimeout(() => {
            if (!gameState.isGameOver) {
                showQuestion();
            }
        }, delay);
    }
    
    // 顯示問題
    function showQuestion() {
        if (!activeQuestions.length) return;

        // 隨機選擇一個問題
        const randomIndex = Math.floor(Math.random() * activeQuestions.length);
        const randomQuestion = activeQuestions[randomIndex];
        gameState.currentQuestion = randomQuestion;
        gameState.currentQuestionIndex = randomIndex;
        gameState.questionActive = true;
        const shuffledOptions = [...randomQuestion.options];
        shuffleOptions(shuffledOptions);

        seenQuestionIndexes.add(randomIndex);
        updateQuestionProgress();
        
        // 更新問題文本
        document.getElementById('questionText').textContent = randomQuestion.text;
        
        // 生成選項
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        
        shuffledOptions.forEach((option, index) => {
            const optionDiv = document.createElement('div');
            optionDiv.className = 'option';
            optionDiv.innerHTML = `
                <span class="option-label">選項 ${index + 1}</span>
                <span class="option-text">${option.text}</span>
            `;
            optionDiv.addEventListener('click', () => selectOption(index, option.score));
            optionsContainer.appendChild(optionDiv);
        });
        
        // 顯示問題彈窗
        document.getElementById('questionModal').classList.add('active');
        
        // 設置倒計時
        startQuestionTimer();
    }

    // Fisher-Yates 洗牌
    function shuffleOptions(options) {
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
    }
    
    // 問題倒計時
    function startQuestionTimer() {
        let timeLeft = getQuestionDurationSeconds();
        updateQuestionTimerDisplay(timeLeft);
        
        const timerInterval = setInterval(() => {
            timeLeft--;
            updateQuestionTimerDisplay(timeLeft);
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (gameState.questionActive) {
                    hideQuestion(); // 時間到自動關閉問題
                    gameState.score = Math.max(0, gameState.score - 1); // 時間到扣1分
                    updateScoreDisplay();
                    
                    // 檢查遊戲是否結束
                    if (gameState.score <= 0) {
                        endGame();
                    } else {
                        scheduleNextQuestion(GAME_CONFIG.postAnswerDelay);
                    }
                }
            }
        }, 1000);
        
        // 儲存interval ID以便後續清除
        gameState.timerInterval = timerInterval;
    }
    
    // 選擇選項
    function selectOption(optionIndex, score) {
        if (!gameState.questionActive) return;
        
        gameState.questionActive = false;
        clearInterval(gameState.timerInterval);
        
        // 更新分數
        gameState.score = Math.max(0, Math.min(10, gameState.score + score));
        updateScoreDisplay();
        
        // 顯示分數變化
        const options = document.querySelectorAll('.option');
        options[optionIndex].classList.add(score > 0 ? 'correct' : 'wrong');
        
        // 800毫秒後隱藏問題並進行下一個
        setTimeout(() => {
            hideQuestion();
            
            // 檢查遊戲是否結束
            if (gameState.score <= 0) {
                endGame();
            } else {
                scheduleNextQuestion(GAME_CONFIG.postAnswerDelay);
            }
        }, 800);
    }
    
    // 隱藏問題
    function hideQuestion() {
        document.getElementById('questionModal').classList.remove('active');
        updateQuestionTimerDisplay(getQuestionDurationSeconds());
    }
    
    // 更新分數顯示
    function updateScoreDisplay() {
        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = gameState.score;
        
        // 分數低時變紅
        if (gameState.score <= 3) {
            scoreDisplay.style.color = '#ef4444';
        } else if (gameState.score <= 5) {
            scoreDisplay.style.color = '#f97316';
        } else {
            scoreDisplay.style.color = '#ec4899';
        }
    }
    
    // 遊戲結束
    function endGame() {
        gameState.isGameOver = true;
        const personalityLabel = selectedPersonality ? PERSONALITY_META[selectedPersonality].label : '未指定';
        
        document.getElementById('finalScore').textContent = `最終好感度: ${gameState.score} / 10`;
        document.getElementById('gameOverMessage').textContent = 
            gameState.score < 3 
                ? `模式：${personalityLabel}。嗯...你說的話似乎激怒了她😭，恭喜你成功踩雷！下次要更小心啦！`
                : `模式：${personalityLabel}。遊戲結束了！你的回答讓她很失望💔`;
        
        document.getElementById('gameOverModal').classList.add('active');
    }
    
    // 處理窗口大小變化
    window.addEventListener('resize', adjustBackgroundScale);
    
    // 啟動遊戲
    window.addEventListener('load', initGame);
</script>
