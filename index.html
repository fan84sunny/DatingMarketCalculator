<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚戀工具集 - 台灣單身必玩</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .container { max-width: 900px; width: 100%; }
        
        .header { text-align: center; margin-bottom: 50px; color: white; }
        .header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 15px; }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4); }
        
        .card-icon { font-size: 3.5rem; margin-bottom: 20px; }
        .card-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; color: #1e293b; }
        .card-desc { color: #64748b; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }
        
        .card-link { display: inline-block; color: #667eea; font-weight: 600; text-decoration: none; }
        .card-link:hover { text-decoration: underline; }
        
        .card-1 { border-top: 4px solid #2563eb; }
        .card-2 { border-top: 4px solid #ec4899; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .header p { font-size: 1rem; }
            .grid { grid-template-columns: 1fr; gap: 20px; }
            .card { padding: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💕 婚戀工具集</h1>
        <p>台灣單身男女必玩的互動工具</p>
    </div>

    <div class="grid">
        <!-- 計算機卡片 -->
        <div class="card card-1">
            <div class="card-icon">📊</div>
            <div class="card-title">PR 值計算機</div>
            <div class="card-desc">
                基於常態分佈與台灣婚戀市場數據的個人評分系統。輸入年齡、收入、身高、學歷等個人資料，精確計算您在婚戀市場中的相對位置。
            </div>
            <a href="calculator.html" class="card-link">進入計算機 →</a>
        </div>

        <!-- 送命題卡片 -->
        <div class="card card-2">
            <div class="card-icon">💬</div>
            <div class="card-title">親密關係經營力測驗</div>
            <div class="card-desc">
                6題單頁式量表，背景即時計分。送出後自動跳轉結果分析，呈現 A-E 關係運作型、主要類型與次要傾向。
            </div>
            <a href="girlfriend-questions.html" class="card-link">開始測驗 →</a>
        </div>

        <!-- 送命題挑戰遊戲卡片 -->
        <div class="card card-2">
            <div class="card-icon">🎮</div>
            <div class="card-title">送命題挑戰遊戲</div>
            <div class="card-desc">
                先選人格模式再開打：首題等待 3 秒，之後每題間隔 1 秒。每題有倒數限制，逾時會扣分，分數歸零即遊戲結束。
            </div>
            <a href="game.html" class="card-link">進入遊戲 →</a>
        </div>
    </div>
</div>

</body>
</html>
